<!-- Troque suas seções manuais por isso -->
<section class="space-y-12">
  <h3 class="text-2xl font-bold mb-6 flex items-center gap-3 border-l-4 border-emerald-500 pl-4">
    <i class="fas fa-video text-emerald-400 text-3xl"></i>
    Todos os vídeos do canal
  </h3>

  <div id="allVideosGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5"></div>
</section>

<script>
  const API_KEY = "SUA_CHAVE_DA_API";
  const CHANNEL_ID = "SEU_CHANNEL_ID";
  const grid = document.getElementById("allVideosGrid");
  const playerFrame = document.getElementById("playerFrame");
  const currentTitleEl = document.getElementById("currentTitle");

  function escapeHtml(str = "") {
    return str.replace(/[&<>"']/g, m => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  async function fetchUploadsPlaylistId() {
    const url = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (!data.items || !data.items.length) throw new Error("Canal não encontrado.");
    return data.items[0].contentDetails.relatedPlaylists.uploads;
  }

  async function fetchAllVideosFromUploads(playlistId) {
    let pageToken = "";
    const videos = [];

    while (true) {
      const url =
        `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet,contentDetails` +
        `&maxResults=50&playlistId=${playlistId}&pageToken=${pageToken}&key=${API_KEY}`;

      const res = await fetch(url);
      const data = await res.json();

      if (!data.items) break;

      for (const item of data.items) {
        const sn = item.snippet;
        const videoId = sn.resourceId?.videoId;
        if (!videoId) continue;

        videos.push({
          id: videoId,
          title: sn.title || "Vídeo sem título",
          thumb:
            sn.thumbnails?.medium?.url ||
            sn.thumbnails?.high?.url ||
            sn.thumbnails?.default?.url ||
            `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`
        });
      }

      if (!data.nextPageToken) break;
      pageToken = data.nextPageToken;
    }

    return videos;
  }

  function changeVideo(id, title) {
    playerFrame.src = `https://www.youtube-nocookie.com/embed/${id}?rel=0&modestbranding=1&controls=1&iv_load_policy=3`;
    currentTitleEl.textContent = title;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function renderVideos(videos) {
    grid.innerHTML = videos.map(v => `
      <div class="video-card" data-video-id="${v.id}" data-video-title="${escapeHtml(v.title)}" data-title="${escapeHtml(v.title)}">
        <img src="${v.thumb}" alt="${escapeHtml(v.title)}" class="rounded-xl w-full object-cover">
        <p class="mt-2 font-semibold text-sm">${escapeHtml(v.title)}</p>
      </div>
    `).join("");

    grid.querySelectorAll(".video-card").forEach(card => {
      card.addEventListener("click", () => {
        changeVideo(card.dataset.videoId, card.dataset.videoTitle);
      });
    });
  }

  async function loadChannelVideos() {
    try {
      const uploadsPlaylistId = await fetchUploadsPlaylistId();
      const videos = await fetchAllVideosFromUploads(uploadsPlaylistId);
      renderVideos(videos);
    } catch (err) {
      grid.innerHTML = `<p class="text-slate-300">Não consegui carregar os vídeos: ${escapeHtml(err.message)}</p>`;
    }
  }

  loadChannelVideos();
</script>
